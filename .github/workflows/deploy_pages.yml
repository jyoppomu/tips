name: deploy-pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*'
      - 'package.json'
      - 'package-lock.json'
      - 'astro.config.mjs'
      - '.marprc.yml'
      - 'scripts/engine.mjs'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch in repository
        uses: actions/checkout@v6.0.3

      - name: Determine versions to use
        id: determine-versions
        run: echo "node-version=$(cat .node-version)" >> $GITHUB_OUTPUT

      - name: Configure Pages
        id: configure-pages
        uses: actions/configure-pages@v6

      - name: Install, build, and upload your site
        uses: withastro/action@v6.1.1
        with:
          node-version: ${{ steps.determine-versions.outputs.node-version }}
          package-manager: npm@11.9.0
        env:
          # configure-pages が解決した値を astro.config.mjs に渡す
          BASE_URL: ${{ steps.configure-pages.outputs.base_url }}
          BASE_PATH: ${{ steps.configure-pages.outputs.base_path }}

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
